name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# whisper-rs links whisper.cpp; we ship our own bindings so bindgen/libclang
# isn't required at build time.
env:
  WHISPER_DONT_GENERATE_BINDINGS: "1"
  CARGO_TERM_COLOR: always

jobs:
  # ── Formatting (fast, no system deps needed) ──────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Lint + test + release build (needs GTK/ALSA/whisper toolchain) ─────────
  build:
    name: clippy / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libasound2-dev \
            cmake clang gettext desktop-file-utils
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Release build
        run: cargo build --release

  # ── Supply-chain: advisories + license/ban/source policy ──────────────────
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
