name: Release

# Builds release artifacts, generates a checksum manifest + detached GPG
# signature, produces an SBOM, and attaches everything to the GitHub Release.
#
# Required repository secrets:
#   GPG_PRIVATE_KEY  — ASCII-armored private signing key (see SECURITY.md)
#   GPG_PASSPHRASE   — passphrase for that key
# The matching public key MUST be published (repo `KEYS` file + SECURITY.md) so
# users can verify downloads.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  WHISPER_DONT_GENERATE_BINDINGS: "1"
  CARGO_TERM_COLOR: always

permissions:
  contents: write # needed to create/update the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libasound2-dev \
            cmake clang gettext desktop-file-utils

      - name: Build release binary
        run: cargo build --release

      - name: Generate SBOM (CycloneDX)
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --override-filename sbom
          mv sbom.json speech-to-text.cdx.json || true

      - name: Stage artifacts
        id: stage
        run: |
          mkdir -p dist
          cp target/release/speech-to-text dist/speech-to-text-x86_64
          cp speech-to-text.cdx.json dist/ 2>/dev/null || true
          cd dist
          # SHA256SUMS over every artifact — the integrity manifest.
          sha256sum * > SHA256SUMS

      - name: Import GPG signing key
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign the checksum manifest
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --armor --detach-sign --output dist/SHA256SUMS.asc dist/SHA256SUMS

      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/speech-to-text-x86_64
            dist/SHA256SUMS
            dist/SHA256SUMS.asc
            dist/speech-to-text.cdx.json
